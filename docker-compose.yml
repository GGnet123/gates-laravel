services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gates_laravel_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel

  nginx:
    image: nginx:1.27-alpine
    container_name: gates_laravel_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravel

  db:
    image: mariadb:11.4
    container_name: gates_laravel_db
    env_file:
      - .env
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "mariadb", "-u${DB_USERNAME}", "-p${DB_PASSWORD}", "${DB_DATABASE}", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gates_laravel_queue
    working_dir: /var/www
    volumes:
      - ./:/var/www
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: php artisan queue:work --sleep=1 --tries=3 --timeout=120
    networks:
      - laravel

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gates_laravel_scheduler
    working_dir: /var/www
    volumes:
      - ./:/var/www
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: sh -lc "while true; do php artisan schedule:run --verbose --no-interaction; sleep 10; done"
    networks:
      - laravel

volumes:
  db_data:

networks:
  laravel:
    driver: bridge
